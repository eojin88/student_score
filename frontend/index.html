<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"> <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>학생 성적 관리 시스템</title>
    <style>
        /*  다크 모드 전용 배경 및 텍스트 색상 */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 30px; 
            background-color: #121212; 
            color: #e0e0e0; 
        }
        h1 { color: #ffffff; text-align: center; }
        
        /* 입력창 영역 (어두운 회색 박스) */
        .input-group { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); 
            margin-bottom: 20px; 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            align-items: center; 
        }
        .input-group input { 
            padding: 10px; 
            background-color: #2c2c2c; /* 어두운 입력칸 */
            color: #ffffff; /* 입력 글씨는 흰색 */
            border: 1px solid #444; 
            border-radius: 4px; 
            width: 100px; 
        }
        .input-group input[type="text"] { width: 150px; }
        /* 입력칸 클릭 시 테두리 색상 */
        .input-group input:focus { outline: none; border-color: #2196F3; } 

        /* 버튼 스타일 */
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-add { background-color: #4CAF50; color: white; }
        .btn-add:hover { background-color: #45a049; }
        .btn-edit { background-color: #ffb300; color: #121212; padding: 5px 10px; margin-right: 5px; }
        .btn-delete { background-color: #ef5350; color: white; padding: 5px 10px; }
        
        /* 테이블 스타일 */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: #1e1e1e; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); 
        }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background-color: #1565c0; color: white; } /* 헤더는 진한 파란색 */
        /* 표 데이터 행에 마우스 올렸을 때 살짝 밝아지는 효과 */
        tbody tr:hover { background-color: #2a2a2a; } 
    </style>
</head>
<body>
    <h1>학생 성적 및 순위표 🏆</h1>
    
    <div class="input-group">
        <input type="text" id="newName" placeholder="학생 이름" required>
        <input type="number" id="newKor" placeholder="국어 점수" min="0" max="100" required>
        <input type="number" id="newEng" placeholder="영어 점수" min="0" max="100" required>
        <input type="number" id="newMath" placeholder="수학 점수" min="0" max="100" required>
        <button class="btn-add" onclick="addStudent()">학생 등록하기</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>등수</th><th>이름</th><th>국어</th><th>영어</th><th>수학</th><th>총점</th><th>평균</th><th>등급</th><th>관리</th>
            </tr>
        </thead>
        <tbody id="student-table-body">
            </tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
